<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="kiber-arena-admin.css">
    <title>Админ-панель — Кибер-арена</title>
</head>
<body>
    <header class="admin-header">
        <a href="kiber-arena.html" class="admin-header__back">← На главную</a>
        <h1 class="admin-header__title">Админ-панель</h1>
    </header>

    <main class="admin-main">
        <section class="admin-section">
            <h2 class="admin-section__title">Мероприятия</h2>
            <button class="admin-btn admin-btn--primary" id="add-event-btn">+ Добавить мероприятие</button>
            <div class="admin-list" id="events-list"></div>
        </section>

        <section class="admin-section">
            <h2 class="admin-section__title">Лидерборд</h2>
            <button class="admin-btn admin-btn--primary" id="add-leader-btn">+ Добавить участника</button>
            <div class="admin-list" id="leaderboard-list"></div>
        </section>
    </main>

    <div class="modal modal--hidden" id="modal">
        <div class="modal__overlay"></div>
        <div class="modal__content">
            <h3 class="modal__title" id="modal-title">Редактировать</h3>
            <form class="modal__form" id="modal-form">
                <div id="modal-fields"></div>
                <div class="modal__actions">
                    <button type="button" class="admin-btn" id="modal-cancel">Отмена</button>
                    <button type="submit" class="admin-btn admin-btn--primary">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <script src="kiber-arena-data.js"></script>
    <script src="kiber-arena-admin.js"></script>
</body>
</html>
